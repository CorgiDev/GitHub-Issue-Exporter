<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issue Exporter</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>GitHub Issue Exporter</h1>

      <form id="search-form" class="search-form">
        <label>
          GitHub Access Token
          <input
            type="password"
            id="token"
            name="token"
            placeholder="ghp_..."
            autocomplete="off"
            required
          />
        </label>

        <label>
          Repository Owner
          <input type="text" id="owner" name="owner" placeholder="e.g., microsoft" required />
        </label>

        <label>
          Repository Name
          <input type="text" id="repo" name="repo" placeholder="e.g., vscode" required />
        </label>

        <label for="includeLabelsAll">Include Labels - ALL (separated by commas)</label>
        <span id="includeLabelsAllDescription">List labels that ALL must be on an issue.</span>
        <input type="text" id="includeLabelsAll" name="includeLabelsAll" placeholder="bug,regression" />
        

        <label for="includeLabelsAny">Include Labels - ANY (separated by commas)</label>
        <span id="includeLabelsAnyDescription">List labels where at least ONE of them must be on an issue.</span>
        <input type="text" id="includeLabelsAny" name="includeLabelsAny" placeholder="help wanted,good first issue" />

        <label for="excludeLabelsAll">Exclude Labels - ALL (separated by commas)</label>
        <span id="excludeLabelsAllDescription">List labels that ALL must NOT be on an issue.</span>
        <input type="text" id="excludeLabelsAll" name="excludeLabelsAll" placeholder="needs-info,stale" />

        <label for="excludeLabelsAny">Exclude Labels - ANY (separated by commas)</label>
        <span id="excludeLabelsAnyDescription">List labels where any ONE of them must NOT be on an issue.</span>
        <input type="text" id="excludeLabelsAny" name="excludeLabelsAny" placeholder="duplicate,wontfix" />

        <div class="form-actions">
          <button type="submit">Search Open Issues</button>
          <button type="button" id="signOutButton" class="secondary-button">Sign out</button>
        </div>
      </form>

      <p id="status" class="status" role="status" aria-live="polite"></p>

      <div id="export-section" class="export-section" hidden>
        <button type="button" id="exportButton" class="export-button">Export as Offline HTML</button>
      </div>

      <div class="table-wrap">
        <table id="results-table" hidden>
          <thead>
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>Labels</th>
              <th>Created Date</th>
              <th>Labels on Issue</th>
              <th>Issue URL</th>
            </tr>
          </thead>
          <tbody id="results-body"></tbody>
        </table>
      </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
